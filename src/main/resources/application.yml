spring:
  application:
    name: leaderboard
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:leaderboard}
    password: ${DB_PASS:leaderboard}
    url: jdbc:postgresql://localhost:5432/leaderboard
  docker:
    compose:
      enabled: true
server:
  port: ${PORT:8080}
  shutdown: graceful

springdoc:
  swagger-ui:
    url: api.yml